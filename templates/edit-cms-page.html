{% extends 'base.html' %}

{% block title %}
<title> Edit cms page </title>
{% endblock %}

{% block content %}

<body class="notranslate vertical-layout vertical-menu-modern  navbar-floating footer-static  " data-open="click"
    data-menu="vertical-menu-modern" data-col="">

    {% include 'header.html' %}

    {% include 'sidebar.html' %}

    <!-- BEGIN: Content-->
    <div class="app-content content ">
        <div class="content-overlay"></div>
        <div class="header-navbar-shadow"></div>
        <div class="content-wrapper">
            <div class="content-header row">
                <div class="content-header-left col-md-9 col-12 mb-2">
                    <div class="row breadcrumbs-top">
                        <div class="col-12">
                            <h2 class="content-header-title float-left mb-0">Edit Cms</h2>
                            <div class="breadcrumb-wrapper">
                                <ol class="breadcrumb">
                                    <li class="breadcrumb-item"><a href="index.html">Home</a>
                                    </li>
                                    <li class="breadcrumb-item"><a href="#">cms</a>
                                    </li>
                                    <li class="breadcrumb-item"><a href="#">{{ cms_title }}</a>
                                    </li>
                                    <li class="breadcrumb-item active">Edit
                                    </li>
                                </ol>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
            <div class="content-body">
                <!-- Blog Edit -->
                <div class="blog-edit-wrapper">
                    <div class="row">
                        <div class="col-12">
                            <div class="card">
                                <div class="card-body">
                                    <!-- Form -->
                                    <form id="edit-cms-form" class="mt-1">
                                        <div class="row">
                                            <div class="col-md-6 col-12">
                                                <div class="form-group mb-2">
                                                    <label for="blog-edit-title">Title</label>
                                                    <input type="text" name="title" id="blog-edit-title"
                                                        class="form-control" value="{{ cms_title }}" />
                                                </div>
                                            </div>

                                            <div class="col-md-6 col-12">
                                                <div class="form-group mb-2">
                                                    <label for="blog-edit-slug">Slug</label>
                                                    <input type="text" name="slug" id="blog-edit-slug"
                                                        class="form-control" value="{{ cms_slug }}" disabled />
                                                </div>
                                            </div>

                                            <div class="col-md-6 col-12">
                                                <div class="form-group mb-2">
                                                    <label for="cms-lang">Localization</label>
                                                    <select class="form-control" id="cms-lang">
                                                        <option value="en">en</option>
                                                        <option value="fr">fr</option>
                                                        <option value="he">he</option>
                                                    </select>
                                                </div>
                                            </div>

                                            <div class="col-12">
                                                <div class="form-group mb-2">
                                                    <label>Content</label>
                                                    <div id="blog-editor-wrapper">
                                                        <div id="blog-editor-container">
                                                            <div class="editor">

                                                            </div>
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>

                                            <div class="col-12" id="action-button">
                                                <button class="btn btn-outline-primary" id="loading-btn" type="submit">
                                                    <span class="spinner-border spinner-border-sm hidden"
                                                        id="loading-spinner" role="status" aria-hidden="true"></span>
                                                    <span class="ml-25 align-middle" id="btn-text">Save Changes</span>
                                                </button>
                                                <button type="reset" class="btn btn-outline-secondary">Cancel</button>
                                            </div>
                                        </div>
                                    </form>
                                    <!--/ Form -->
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <!--/ Blog Edit -->

            </div>
        </div>
    </div>
    <!-- END: Content-->

    <div class="sidenav-overlay"></div>
    <div class="drag-target"></div>

    <!-- BEGIN: Footer-->
    <footer class="footer footer-static footer-light">
        <p class="clearfix mb-0"><span class="float-md-left d-block d-md-inline-block mt-25">COPYRIGHT &copy; 2021<a
                    class="ml-25" href="https://1.envato.market/pixinvent_portfolio" target="_blank">Pixinvent</a><span

                class="float-md-right d-none d-md-block">Hand-crafted & Made with<i data-feather="heart"></i></span></p>
    </footer>
    <button class="btn btn-primary btn-icon scroll-top" type="button"><i data-feather="arrow-up"></i></button>
    <!-- END: Footer-->




    <!-- BEGIN: Vendor JS-->
    <script src="{{ url_for('static', path='/vendors/js/vendors.min.js') }}"></script>
    <script src="{{ url_for('static', path='/vendors/js/extensions/toastr.min.js') }}"></script>
    <!-- BEGIN Vendor JS-->

    <!-- BEGIN: Page Vendor JS-->
    <script src="{{ url_for('static', path='/vendors/js/forms/select/select2.full.min.js') }}"></script>
    <script src="{{ url_for('static', path='/vendors/js/editors/quill/katex.min.js') }}"></script>
    <script src="{{ url_for('static', path='/vendors/js/editors/quill/highlight.min.js') }}"></script>
    <script src="{{ url_for('static', path='/vendors/js/editors/quill/quill.min.js') }}"></script>
    <!-- END: Page Vendor JS-->

    <!-- BEGIN: Theme JS-->
    <script src="{{ url_for('static', path='/js/core/app-menu.js') }}"></script>
    <script src="{{ url_for('static', path='/js/core/app.js') }}"></script>
    <!-- END: Theme JS-->

    <!-- BEGIN: Page JS-->
    <script src="{{ url_for('static', path='/js/scripts/pages/page-blog-edit.js') }}"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/izitoast/1.4.0/js/iziToast.min.js"></script>

    <!-- END: Page JS-->


    <script>
        $(window).on('load', function () {
            if (feather) {
                feather.replace({
                    width: 14,
                    height: 14
                });
            }
        })

        const isRtl = $('html').attr('data-textdirection') === 'rtl';
        const select = $('#cms-lang');
        const loadingBtn = document.getElementById('loading-btn')
        const btnText = document.getElementById('btn-text')
        const spinner = document.getElementById('loading-spinner')
        var editor = '#blog-editor-container .editor';
        var blogFeatureImage = $('#blog-feature-image');
        var blogImageText = document.getElementById('blog-image-text');
        var blogImageInput = $('#blogCustomFile');
        const editCmsForm = document.getElementById('edit-cms-form');

        editCmsForm.addEventListener('submit', editCms);

        // Basic Select2 select
        select.each(function () {
            var $this = $(this);
            $this.wrap('<div class="position-relative"></div>');

            $this.select2({

                // the following code is used to disable x-scrollbar when click in select input and
                // take 100% width in responsive also
                minimumResultsForSearch: Infinity,
                dropdownAutoWidth: true,
                dropdownParent: $this.parent()
            });
        });
        select.val('{{ lang }}').trigger('change');



        select.on('select2:select', function (e) {
            var data = e.params.data;
            window.location = "/admin/cms/edit/{{ cms.slug }}?lang=" + data['text']
        });

        function showIsLoading() {
            spinner.classList.toggle("hidden");
            loadingBtn.disabled = true;
            btnText.innerHTML = 'Saving ....'
        }

        function hideIsLoading() {
            spinner.classList.toggle("hidden");
            loadingBtn.disabled = false;
            btnText.innerHTML = 'Save Changes'
        }


        function editCms(event) {
            event.preventDefault();

            showIsLoading();

            const formData = new FormData(editCmsForm);

            const data = {
                title: formData.get('title'),
                content: blogEditor.root.innerHTML,
            };


            console.log(data)
            const selectedValue = select.val();
            console.log(selectedValue)

            fetch('/admin/cms/{{ cms_slug }}?lang={{ lang }}', {
                method: 'PATCH',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(data)
            })
                .then(data => {
                    iziToast.success({
                        title: '',
                        message: "Cms updated sucessfully",
                        position: 'topRight'
                    });
                    hideIsLoading();
                })
                .catch(error => {
                    iziToast.error({
                        title: '',
                        message: "An error occured while updating cms content",
                        position: 'topRight'
                    });
                    console.error('Error:', error);
                });

        }

        // Snow Editor

        var Font = Quill.import('formats/font');
        Font.whitelist = ['sofia', 'slabo', 'roboto', 'inconsolata', 'ubuntu'];
        Quill.register(Font, true);

        var blogEditor = new Quill(editor, {
            bounds: editor,
            modules: {
                formula: false,
                syntax: true,
                toolbar: [
                    [
                        {
                            font: []
                        },
                        {
                            size: []
                        }
                    ],
                    ['bold', 'italic', 'underline', 'strike'],
                    [
                        {
                            color: []
                        },
                        {
                            background: []
                        }
                    ],
                    [
                        {
                            script: 'super'
                        },
                        {
                            script: 'sub'
                        }
                    ],
                    [
                        {
                            header: '1'
                        },
                        {
                            header: '2'
                        },
                        'blockquote',
                        'code-block'
                    ],
                    [
                        {
                            list: 'ordered'
                        },
                        {
                            list: 'bullet'
                        },
                        {
                            indent: '-1'
                        },
                        {
                            indent: '+1'
                        }
                    ],
                    [
                        'direction',
                        {
                            align: []
                        }
                    ],
                    ['link'],
                    ['clean']
                ]
            },
            theme: 'snow'
        });

        var htmlContent = {{cms_content| tojson }};

        blogEditor.root.innerHTML = htmlContent




        // // Change featured image
        // if (blogImageInput.length) {
        //     $(blogImageInput).on('change', function (e) {
        //         var reader = new FileReader(),
        //             files = e.target.files;
        //         reader.onload = function () {
        //             if (blogFeatureImage.length) {
        //                 blogFeatureImage.attr('src', reader.result);
        //             }
        //         };
        //         reader.readAsDataURL(files[0]);
        //         blogImageText.innerHTML = blogImageInput.val();
        //     });
        // }

    </script>
</body>
{% endblock %}
