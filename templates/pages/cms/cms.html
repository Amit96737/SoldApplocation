{% extends 'base.html' %}

{% block title %}
<title>Sold Admin - {{ cms_title }}</title>
{% endblock %}

{% block content %}

<main>
    <div class="flex flex-col h-[92vh]" x-data="{
        cmsContent: `{{ cms_content }}`,
        init(){
            this.$refs.contentContainer.innerHTML = this.cmsContent;
        },
        deleteCms(slug) {
            this.isLoading = true;
            axios.delete(`/admin/api/cms/${slug}`, {
                headers: {
                    'Content-Type': 'application/json'
                }
            }).then(response => {
            window.location = '/admin';

            }).catch(error => {
                this.isLoading = false;
            });
        }
    }">
        <div
            class="px-5 pt-8 block sm:flex items-center justify-between lg:mt-1.5 bg-white dark:bg-gray-800 dark:border-gray-700">
            <div class="w-full mb-1">
                <div class="mb-6">
                    <nav class="flex mb-5" aria-label="Breadcrumb">
                        <ol class="inline-flex items-center space-x-1 text-sm font-medium md:space-x-2">
                            <li class="inline-flex items-center">
                                <a href="#"
                                    class="inline-flex items-center text-gray-700 hover:text-primary-600 dark:text-gray-300 dark:hover:text-white">
                                    <svg class="w-5 h-5 mr-2.5" fill="currentColor" viewBox="0 0 20 20"
                                        xmlns="http://www.w3.org/2000/svg">
                                        <path
                                            d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z">
                                        </path>
                                    </svg>
                                    Home
                                </a>
                            </li>
                            <li>
                                <div class="flex items-center">
                                    <svg class="w-6 h-6 text-gray-400" fill="currentColor" viewBox="0 0 20 20"
                                        xmlns="http://www.w3.org/2000/svg">
                                        <path fill-rule="evenodd"
                                            d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z"
                                            clip-rule="evenodd"></path>
                                    </svg>
                                    <a href="#"
                                        class="ml-1 text-gray-700 hover:text-primary-600 md:ml-2 dark:text-gray-300 dark:hover:text-white">App
                                        Cms</a>
                                </div>
                            </li>
                            <li>
                                <div class="flex items-center">
                                    <svg class="w-6 h-6 text-gray-400" fill="currentColor" viewBox="0 0 20 20"
                                        xmlns="http://www.w3.org/2000/svg">
                                        <path fill-rule="evenodd"
                                            d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z"
                                            clip-rule="evenodd"></path>
                                    </svg>
                                    <span class="ml-1 text-gray-400 md:ml-2 dark:text-gray-500" aria-current="page">{{
                                        cms_title }}</span>
                                </div>
                            </li>
                        </ol>
                    </nav>
                    <h3 class="text-[1.4rem] font-semibold text-gray-900 sm:text-2xl dark:text-white">{{ cms_title }}
                    </h3>
                </div>
            </div>
        </div>

        <div
            class="m-5 overflow-y-auto px-4 flex-auto bg-white dark:border-gray-700 shadow-md sm:rounded-lg py-5 dark:bg-gray-900">
            <div class=" ">

                <div class="dark:text-white" x-ref="contentContainer"></div>
            </div>
        </div>
        <div class="px-5 pb-5 flex justify-end space-x-3">
            <button @click="deleteCms('{{cms.slug}}');"
                class="px-4 flex items-center py-2.5 text-sm font-medium text-center text-white bg-red-700 rounded-lg hover:bg-red-800 dark:bg-red-600 dark:hover:bg-red-700">
                Delete {{ cms_title }}
            </button>

            <button @click="window.location = '/admin/cms/edit/'+ '{{cms.slug}}'"
                class="px-4 flex items-center py-2.5 text-sm font-medium text-center text-white bg-blue-700 rounded-lg hover:bg-blue-800 dark:bg-blue-600 dark:hover:bg-blue-700">
                Edit {{ cms_title }}
            </button>
        </div>

    </div>
</main>

{% endblock %}
